<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SitePal Avatar Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <!-- Left: Avatar panel -->
    <section class="panel">
      <div class="panel-header">
        <span>Avatar</span>
        <div class="char-switcher">
          <button class="char-btn active" id="charBtn0" type="button">Character 1</button>
          <button class="char-btn" id="charBtn1" type="button">Character 2</button>
        </div>
      </div>
      <div class="avatar-wrap">
        <script type="text/javascript" src="//vhss-d.oddcast.com/vhost_embed_functions_v4.php?acc=8412077&js=0"></script>
        <div id="sitepal-container"></div>
        <div class="status" id="statusText"></div>
      </div>
    </section>

    <!-- Right: Chat panel -->
    <section class="chat-panel">
      <div class="chat-header">
        <div class="avatar-dot">🤖</div>
        <div class="chat-header-info">
          <div class="chat-header-title" id="chatTitle">Echo Chat</div>
          <div class="chat-header-sub" id="chatSub">Avatar repeats what you say</div>
        </div>
        <div class="mode-toggle">
          <button class="mode-btn active" id="echoModeBtn" type="button">Echo</button>
          <button class="mode-btn" id="llmModeBtn" type="button">LLM</button>
        </div>
      </div>


      <div class="messages" id="messages"></div>

      <div class="composer">
        <input
          id="chatInput"
          type="text"
          placeholder="Type a message…"
        />
        <button id="sendBtn">Send</button>
        <button id="micBtn">🎤 Mic</button>
        <button id="stopBtn">⏹ Stop</button>
        <button id="clearBtn">Clear</button>
      </div>
    </section>

  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
